<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ecfdf5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f9ff;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#10b981" flood-opacity="0.15"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)"/>
  
  <!-- Outer glowing ring -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#grad2)" stroke-width="12" stroke-linecap="round" filter="url(#shadow)" opacity="0.8"/>
  
  <!-- Inner Flame / Leaf shape for energy and health -->
  <path d="M256,120 C290,190 350,230 350,290 C350,350 300,390 256,390 C212,390 162,350 162,290 C162,230 222,190 256,120 Z" fill="url(#grad1)"/>
  
  <!-- Stylized Weight Trend Line inside the leaf -->
  <path d="M200,290 L240,260 L270,285 L310,240" fill="none" stroke="#ffffff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Heart Icon overlay to show health -->
  <path d="M256,335 C256,335 244,323 234,323 C224,323 218,330 218,338 C218,348 232,358 256,368 C280,358 294,348 294,338 C294,330 288,323 278,323 C268,323 256,335 256,335 Z" fill="#ffffff" opacity="0.9"/>
</svg>
